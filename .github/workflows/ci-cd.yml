# seamaze CI/CD workflow

name: CI/CD

on:
  push:
    branches: [ master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ master ]

jobs:
  test-and-coverage:
    name: Test (Python ${{ matrix.python-version }} on ${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.12', '3.13', '3.14', '3.15']
        os: [ubuntu-latest, windows-latest, macos-latest]

    runs-on: ${{ matrix.os }}
    
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        id: setup-python
        uses: actions/setup-python@v5
        continue-on-error: true
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install Poetry
        if: steps.setup-python.outcome == 'success'
        uses: abatilo/actions-poetry@v3
        with:
          poetry-version: 1.5.1

      - name: Install dependencies
        if: steps.setup-python.outcome == 'success'
        run: poetry install

      - name: Run tests with coverage
        if: steps.setup-python.outcome == 'success'
        run: poetry run pytest --cov=seamaze --cov-report=lcov || echo "No tests found or pytest failed"
        
      - name: Upload coverage to Coveralls
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11' && steps.setup-python.outcome == 'success'
        uses: coverallsapp/github-action@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path-to-lcov: coverage.lcov
          allow-empty: true

  deploy:
    name: Build and Publish to PyPI
    needs: test
    if: (github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/v')) && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Poetry
        uses: abatilo/actions-poetry@v3
        with:
          poetry-version: 1.5.1

      - name: Build and Publish
        run: |
          poetry build
          poetry publish

